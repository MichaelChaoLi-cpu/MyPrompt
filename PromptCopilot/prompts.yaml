prompts:
- goal: '增加一个新的功能，

    在右栏底部加一个，添加工作文件夹的选项。

    这个地址应该是绝对地址，添加后，可以读取这个目录下的结构。

    可以在右侧选择打开这个目录，打开后可以选择输入和输出。

    然后每个条目后面可以勾选。

    如果选择的是输入，勾选后，这个文件的相对地址就会按条列在输入。

    输出也是一样，选了输出就列在输出。

    输入输出还可以手动添加，新的条目。但是勾选的不得修改

    绝对地址存在项目的config.yaml中'
