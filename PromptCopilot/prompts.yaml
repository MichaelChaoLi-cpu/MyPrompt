- goal: '增加功能。

    可以通过设置把引入一个git repo来控制data

    点开设置，可以粘贴一个git repo，然后点击初始化，就在data里初始化。

    最好是public的可以然后点击同步，就让本地与remote同步，如果本地跟远端没有冲突，就完成最新同步。

    为了确保不冲突，如果设置了git，每次启动后选择项目或者创建项目都要检查。然后要求弹窗同步。这是强制的。'
