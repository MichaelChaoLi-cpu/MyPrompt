    \ REGEX 可以用但不是必须用，还是说 REGEX 应该被替代掉？\n  3. 你提这个问题，是发现了某个具体的问题（比如 LLM\n  查全称不准、某个缩写没被处理到），还是在思考这一步的设计是否合理？\n\
    \n好，我认为1和2的问题不大。\n我在之前的例子中发现Abbr会被多次定义。\n我的规定是这样的：\n1 abstract和正文部分是独立的。\n换句话说，正文部分，所有缩写都要重新定义。\n\
    而且一次定义后后面就只用缩写：\n举个例子Large Language Model (LLM)，之后所有的Large Language Model都应该被替换为LLM。\n\
    我建议加一个yaml，定义原词和缩写。然后替换常见的情况比如第一次出现之后的Large Language Model和Large Language Model\
    \ (LLM)都应该是LLM。\n然后现在Reference相关的内容不能动。"
