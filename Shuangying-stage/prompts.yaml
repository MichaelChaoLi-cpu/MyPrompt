- goal: '现在调整策略。

    我们把引用氛围两类：

    显性引用和隐形引用。

    显性引用主要针对：

    - Data and Measurement

    - Methodology

    - Results

    这两部分图表要分布于各个段了，且只用一次。

    将来在writer的部分，prompt要求明确提及表名图名。


    隐形引用：

    这主要回避

    - Introduction

    - Discussion

    这个两个section的段落中可以加图加表。

    - Introduction

    可以使用数据说明性图表一次，不集中一个段落。

    不要求使用全部的图表。

    图表id加在相关句子之下。


    - Discussion

    可以结合讨论目标选择图表。

    可以使用全部图表一次，不集中一个段落。

    不要求使用全部的图表。

    图表id加在相关句子之下。'
