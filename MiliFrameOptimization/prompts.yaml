- goal: "研究工作流：\n先帮我更细SKILL_PLAN.md\n\n1. 数据简报\n目的：是让用户对已有数据有个明确的认识，其次，帮助用户完成对变量进行筛选。\n\
    输出应该包括分布图和数据汇总表\n如果包括时序数据应该询问用户用不用可视化时序变量。\n输入：data/raw data/processed src/exp\n\
    输出：data/exp/数据简报\n\n2. 研究问题规划\n帮助用户制作可以用于研究的点，应该包括4-5点。\n结构为一个中心点，其他点应该是分点，来加深或者扩宽研究。\n\
    输入为： data/exp\n输出为：docs/AnaSOP.md\n\n3. 可行性验证\n用当前数据来确认计划的问题能够被证真，证伪，或者总结出新的知识。\n\
    这一步可能再其次要求出触发 研究问题规划\n输入：docx/AnaSOP.md data/raw data/processed \n输出： data/exp\n\
    \n4. 数据预处理\n这一步需要处理数据，重新命名变量名。\n这里变量名应该被一一确定，而且应该与论文中使用的尽可能的一致\n这里变量的情况应该优先记录与docx/AnaSOP.md\n\
    输入：data/raw data/processed docs/AnaSOP.md\n输出：docs/AnaSOP.md， data/processed src/preprocessing\n\
    \n5. 图表计划\n这一步规划出有多少图和表。这一步可能会触发要求修改数据预处理。\n图，要说明表达的内容，形式，有几个子panel\n表，应该要说明表达的内容，有多少行列，行列的意义\n\
    这些多明确记载AnaSOP中\n输入：data/raw data/processed docs/AnaSOP.md\n输出：docs/AnaSOP.md，\n\
    \n6. 图表制作\n按照图表计划，一个一个的生成图表。\n每一个图表都由一个py script生成\n输入：data/raw data/processed\
    \ docs/AnaSOP.md\n输出：data/results/figures data/results/tables src/analyses docs/AnaSOP.md\n\
    \n7. 挑毛病\n这个skill就是看输入，然后挑毛病。\n一，图表能不能证明问题，分析是不是合理\n二，图表看起来是不是有问题\n这一步可能会导致重启动任何一步\n\
    输入：data/results/figures data/results/tables src/analyses docs/AnaSOP.md\n输出：docs/issues.md\n\
    \n8. 建立内容字典\n根据现在的docs/LAWS/law_actionbrief.yaml\n输入：data/results/figures data/results/tables\
    \ src/analyses docs/AnaSOP.md\n输出：docs/actionbrief.yaml"
