- goal: "关于自变量（新闻）：\n  你说的\"农食相关新闻数量\"具体指哪个列？\n  - agrifood_count（原始篇数）\n  - agrifood_share（agrifood\
    \ 新闻占该州总新闻的比例）\n  - 还是两者都要？\n\n分别测试呢\n\n  关于因变量（企业/就业/工资）：\n  - 就业用哪个？month1_emplvl\
    \ / month2_emplvl / month3_emplvl 三列取平均，还是只用某一个？\n  - 工资用 avg_wkly_wage（平均周薪）还是\
    \ total_qtrly_wages（季度总工资）？\n\nmonth1_emplvl / month2_emplvl / month3_emplvl 是不是应该三者的和\n\
    total_qtrly_wages这个可以\n\n  关于\"测试\"的形式：\n  - 简单相关系数？\n  - OLS 回归（新闻 → 企业/就业/工资）？\n\
    \  - 面板回归（控制州固定效应、时间固定效应）？\n\n  - OLS 回归（新闻 → 企业/就业/工资）？\n  - 面板回归（控制州固定效应、时间固定效应）？这两个都试试，还有two-way\n\
    \n  关于时间结构：\n  新闻对企业的影响是同期的，还是你想测试新闻有没有滞后效应（比如上一季度的新闻影响这一季度的就业）？\n\n同期和滞后都是一下"
